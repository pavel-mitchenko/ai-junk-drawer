<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Softmax Lab</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  /* ============================================================
     Softmax Lab — Y2K / cyber-Tamagotchi edition
     Black + acid violet/cyan/magenta. Orbitron + Share Tech Mono.
     ============================================================ */

  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #050308;
    --bg-deeper: #020104;
    --panel: #0d0a18;
    --panel-edge: #1a1330;
    --line: #2a1f50;
    --line-soft: #1a1338;

    --text: #f0e7ff;
    --text-muted: #9d8fd9;
    --text-soft: #6a5fa3;
    --text-readout: #c4b5fd;

    --violet: #a855f7;
    --violet-hot: #c084fc;
    --cyan: #22d3ee;
    --cyan-hot: #67e8f9;
    --magenta: #ff2e92;
    --magenta-hot: #ff5cab;
    --lime: #bef264;

    --radius: 18px;
    --radius-pill: 999px;
    --radius-sm: 10px;

    --shadow-glass: inset 0 1px 0 rgba(255,255,255,0.08), inset 0 -1px 0 rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.6);
    --shadow-deep: 0 6px 22px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.06);
    --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', ui-monospace, "SF Mono", Menlo, monospace;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    height: 100vh;
    overflow: hidden;
    letter-spacing: 0.01em;
  }

  /* CRT background: radial vignette + faint scanlines + grid haze */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 20%, rgba(168, 85, 247, 0.18), transparent 60%),
      radial-gradient(ellipse 70% 50% at 90% 90%, rgba(34, 211, 238, 0.13), transparent 55%),
      radial-gradient(ellipse 60% 40% at 70% 30%, rgba(255, 46, 146, 0.10), transparent 60%),
      var(--bg);
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0,
      transparent 2px,
      rgba(0,0,0,0.18) 2px,
      rgba(0,0,0,0.18) 3px
    );
    mix-blend-mode: multiply;
    opacity: 0.45;
  }

  .page {
    position: relative;
    z-index: 2;
    max-width: 1340px;
    margin: 0 auto;
    padding: 18px 22px 22px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* ========== Header ========== */
  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-shrink: 0;
    padding: 4px 6px;
  }
  .page-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 0.08em;
    margin: 0;
    text-transform: uppercase;
    background: linear-gradient(180deg, #ffffff 0%, var(--violet-hot) 50%, var(--magenta) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 16px rgba(168, 85, 247, 0.4);
    position: relative;
  }
  .page-title::before {
    content: '◆';
    color: var(--cyan);
    -webkit-text-fill-color: var(--cyan);
    margin-right: 10px;
    font-size: 14px;
    vertical-align: 3px;
    text-shadow: 0 0 8px var(--cyan);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .page-subtitle {
    font-size: 11px;
    color: var(--text-readout);
    font-weight: 400;
    letter-spacing: 0.06em;
    text-transform: lowercase;
  }
  .page-subtitle::before {
    content: '>>> ';
    color: var(--cyan);
    font-weight: bold;
  }

  /* Lang switch — chrome pill */
  .lang-switch {
    display: inline-flex;
    background: linear-gradient(180deg, #1a1230 0%, #08051a 100%);
    border: 1px solid var(--line);
    border-radius: var(--radius-pill);
    padding: 3px;
    box-shadow: var(--shadow-glass);
  }
  .lang-btn {
    background: transparent;
    border: none;
    color: var(--text-soft);
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    padding: 5px 12px;
    border-radius: var(--radius-pill);
    cursor: pointer;
    transition: all var(--transition);
  }
  .lang-btn:hover { color: var(--text); }
  .lang-btn.active {
    background: linear-gradient(180deg, var(--violet-hot) 0%, var(--violet) 100%);
    color: #fff;
    box-shadow: 0 0 12px rgba(168, 85, 247, 0.6), inset 0 1px 0 rgba(255,255,255,0.4);
    text-shadow: 0 1px 0 rgba(0,0,0,0.4);
  }

  @media (max-width: 720px) {
    .page-subtitle { display: none; }
  }

  /* ========== Card / panel ========== */
  .card {
    background:
      linear-gradient(180deg, rgba(168, 85, 247, 0.08) 0%, transparent 30%),
      linear-gradient(180deg, var(--panel) 0%, var(--bg-deeper) 100%);
    border: 1px solid var(--panel-edge);
    border-radius: var(--radius);
    box-shadow: var(--shadow-deep);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(192, 132, 252, 0.6) 50%, transparent 100%);
    pointer-events: none;
  }

  /* ========== Top control row ========== */
  .top-row {
    padding: 14px 18px;
    display: flex;
    align-items: stretch;
    gap: 18px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .sliders-col {
    flex: 1 1 360px;
    min-width: 280px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    justify-content: center;
  }
  .slider-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .slider-row .slider-label {
    width: 92px;
    flex-shrink: 0;
  }
  .slider-row input[type="range"] { flex: 1; }
  .slider-row .count-value {
    min-width: 56px;
    text-align: right;
  }

  .slider-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--cyan);
    white-space: nowrap;
  }

  .count-value {
    font-family: 'Share Tech Mono', monospace;
    font-variant-numeric: tabular-nums;
    font-weight: 400;
    color: var(--lime);
    font-size: 14px;
    text-shadow: 0 0 8px rgba(190, 242, 100, 0.5);
  }

  /* ========== Sliders ========== */
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 8px;
    background: linear-gradient(180deg, #08051a 0%, #1a1338 100%);
    border: 1px solid var(--line);
    border-radius: var(--radius-pill);
    outline: none;
    cursor: pointer;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.6);
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 35% 30%, #fff 0%, var(--magenta-hot) 25%, var(--magenta) 60%, #6a0934 100%);
    border: 1px solid rgba(255,255,255,0.4);
    cursor: pointer;
    box-shadow:
      0 0 14px rgba(255, 46, 146, 0.7),
      inset 0 1px 0 rgba(255,255,255,0.6),
      inset 0 -2px 4px rgba(0,0,0,0.4);
    transition: transform 150ms ease;
  }
  input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.12);
  }
  input[type="range"]::-moz-range-thumb {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff 0%, var(--magenta-hot) 25%, var(--magenta) 60%, #6a0934 100%);
    border: 1px solid rgba(255,255,255,0.4);
    cursor: pointer;
    box-shadow: 0 0 14px rgba(255, 46, 146, 0.7);
  }

  /* ========== Buttons ========== */
  .btn {
    background: linear-gradient(180deg, #2a1f50 0%, #14092e 100%);
    border: 1px solid var(--line);
    color: var(--text);
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 9px 14px;
    border-radius: var(--radius-pill);
    cursor: pointer;
    transition: all var(--transition);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    white-space: nowrap;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.10),
      inset 0 -1px 0 rgba(0,0,0,0.4),
      0 2px 6px rgba(0,0,0,0.5);
  }
  .btn:hover {
    background: linear-gradient(180deg, #3a2a70 0%, #1c0f3e 100%);
    border-color: var(--violet);
    box-shadow:
      0 0 12px rgba(168, 85, 247, 0.5),
      inset 0 1px 0 rgba(255,255,255,0.15),
      inset 0 -1px 0 rgba(0,0,0,0.4);
  }
  .btn:active { transform: translateY(1px); }
  .btn svg { color: var(--cyan); }

  /* Primary button = magenta glossy */
  .btn-primary, .fill-btn.primary {
    background:
      linear-gradient(180deg, var(--magenta-hot) 0%, var(--magenta) 50%, #a01060 100%);
    color: #fff;
    border-color: rgba(255,255,255,0.3);
    text-shadow: 0 1px 0 rgba(0,0,0,0.4);
    box-shadow:
      0 0 16px rgba(255, 46, 146, 0.55),
      inset 0 1px 0 rgba(255,255,255,0.5),
      inset 0 -2px 4px rgba(0,0,0,0.3);
  }
  .btn-primary:hover, .fill-btn.primary:hover {
    background:
      linear-gradient(180deg, #ff7ec0 0%, var(--magenta-hot) 50%, var(--magenta) 100%);
    border-color: rgba(255,255,255,0.5);
    box-shadow:
      0 0 24px rgba(255, 46, 146, 0.8),
      inset 0 1px 0 rgba(255,255,255,0.6),
      inset 0 -2px 4px rgba(0,0,0,0.3);
  }
  .btn-primary svg, .fill-btn.primary svg { color: #fff; }

  .icon-btn {
    width: 30px;
    height: 30px;
    flex-shrink: 0;
    background: linear-gradient(180deg, #1a1230 0%, #08051a 100%);
    border: 1px solid var(--line);
    border-radius: 50%;
    color: var(--cyan);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    transition: all var(--transition);
    box-shadow: var(--shadow-glass);
  }
  .icon-btn:hover {
    background: linear-gradient(180deg, #2a1f50 0%, #14092e 100%);
    color: var(--cyan-hot);
    box-shadow: 0 0 10px rgba(34, 211, 238, 0.5), var(--shadow-glass);
  }
  .icon-btn:active { transform: translateY(1px); }
  .icon-btn-placeholder {
    visibility: hidden;
    pointer-events: none;
  }

  /* ========== Main layout ========== */
  .main {
    flex: 1 1 auto;
    min-height: 0;
    display: grid;
    grid-template-columns: 1fr 260px;
    gap: 12px;
  }
  .charts-stack {
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 0;
  }
  .chart-card {
    flex: 1 1 0;
    min-height: 0;
    padding: 12px 16px 10px;
    display: flex;
    flex-direction: column;
  }
  .chart-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 6px;
    flex-shrink: 0;
  }
  .chart-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text);
  }
  .chart-title::before {
    content: '▸ ';
    color: var(--magenta);
    text-shadow: 0 0 6px var(--magenta);
  }
  .chart-hint {
    font-size: 10px;
    color: var(--text-readout);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
  }
  .chart-header-right {
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .chart-wrap {
    position: relative;
    flex: 1 1 0;
    min-height: 0;
    width: 100%;
  }

  /* ========== Lock toggle ========== */
  .lock-toggle {
    position: relative;
    display: inline-flex;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }
  .lock-toggle input {
    position: absolute;
    opacity: 0;
    width: 100%;
    height: 100%;
    margin: 0;
    cursor: pointer;
  }
  .lock-icon {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: linear-gradient(180deg, #1a1230 0%, #08051a 100%);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--text-soft);
    transition: all var(--transition);
    position: relative;
    box-shadow: var(--shadow-glass);
  }
  .lock-icon svg {
    width: 13px;
    height: 13px;
    position: absolute;
    transition: opacity 150ms ease, transform 150ms ease;
  }
  .lock-icon .lock-closed { opacity: 0; transform: scale(0.7); }
  .lock-toggle:hover .lock-icon {
    color: var(--cyan-hot);
    border-color: var(--cyan);
  }
  .lock-toggle input:checked ~ .lock-icon {
    background: linear-gradient(180deg, var(--cyan-hot) 0%, var(--cyan) 60%, #0e7490 100%);
    color: #02212b;
    border-color: rgba(255,255,255,0.3);
    box-shadow: 0 0 12px rgba(34, 211, 238, 0.7), inset 0 1px 0 rgba(255,255,255,0.5);
  }
  .lock-toggle input:checked ~ .lock-icon .lock-open { opacity: 0; transform: scale(0.7); }
  .lock-toggle input:checked ~ .lock-icon .lock-closed { opacity: 1; transform: scale(1); }

  /* ========== Sidebar ========== */
  .sidebar {
    padding: 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    overflow-y: auto;
  }
  .sidebar::-webkit-scrollbar { width: 8px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb {
    background: var(--line);
    border-radius: 999px;
  }

  .sidebar-section {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .sidebar-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--magenta);
    text-shadow: 0 0 6px rgba(255, 46, 146, 0.5);
    margin-bottom: 0px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sidebar-label::before {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--magenta);
    box-shadow: 0 0 6px var(--magenta);
    border-radius: 50%;
  }

  /* ========== Number inputs ========== */
  .number-input {
    background: linear-gradient(180deg, #08051a 0%, #04020c 100%);
    border: 1px solid var(--line);
    border-radius: var(--radius-pill);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--lime);
    padding: 7px 10px;
    font-variant-numeric: tabular-nums;
    transition: all var(--transition);
    outline: none;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.6);
    text-shadow: 0 0 4px rgba(190, 242, 100, 0.3);
  }
  .number-input:focus {
    border-color: var(--cyan);
    box-shadow:
      inset 0 1px 3px rgba(0,0,0,0.6),
      0 0 0 3px rgba(34, 211, 238, 0.18),
      0 0 12px rgba(34, 211, 238, 0.4);
  }
  .number-input:disabled {
    color: var(--text-soft);
    background: #08051a;
    cursor: not-allowed;
    opacity: 0.5;
  }
  .no-spin::-webkit-outer-spin-button,
  .no-spin::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .no-spin {
    -moz-appearance: textfield;
    appearance: textfield;
  }

  /* ========== Fill section ========== */
  .fill-btn { width: 100%; padding: 10px 14px; }
  .fill-btn-content {
    display: inline-flex;
    align-items: center;
    gap: 7px;
  }

  .range-pair {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .range-field {
    position: relative;
    display: block;
  }
  .range-tag {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    color: var(--cyan);
    pointer-events: none;
    user-select: none;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .range-num {
    width: 100%;
    padding-left: 38px;
    text-align: right;
  }

  .steps-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    align-items: stretch;
  }
  .steps-row .range-field { display: block; }
  .steps-row .fill-btn { width: 100%; }

  /* ========== Filters ========== */
  .filter-block {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .filter-block + .filter-block {
    padding-top: 14px;
    border-top: 1px solid var(--line-soft);
  }
  .filter-head {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .filter-block.disabled .filter-name {
    color: var(--text-soft);
  }
  .filter-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--cyan);
    flex: 1;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .filter-block.disabled .filter-name { color: var(--text-soft); }
  .filter-block .number-input {
    width: 100%;
  }

  /* Custom checkbox */
  .check {
    position: relative;
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    cursor: pointer;
  }
  .check input {
    position: absolute;
    opacity: 0;
    width: 100%; height: 100%;
    margin: 0;
    cursor: pointer;
  }
  .check-box {
    width: 20px;
    height: 20px;
    border-radius: 6px;
    border: 1px solid var(--line);
    background: linear-gradient(180deg, #08051a 0%, #04020c 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--transition);
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.6);
  }
  .check-box svg {
    width: 11px;
    height: 11px;
    color: #fff;
    opacity: 0;
    transform: scale(0.5);
    transition: opacity 150ms ease, transform 150ms ease;
  }
  .check input:checked + .check-box {
    background: linear-gradient(180deg, var(--lime) 0%, #84cc16 100%);
    border-color: rgba(255,255,255,0.4);
    box-shadow: 0 0 10px rgba(190, 242, 100, 0.6), inset 0 1px 0 rgba(255,255,255,0.5);
  }
  .check input:checked + .check-box svg {
    opacity: 1;
    transform: scale(1);
    color: #14290a;
  }

  /* ========== Edit overlay ========== */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(2, 1, 8, 0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 180ms ease;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .overlay.show { opacity: 1; pointer-events: auto; }

  .edit-modal {
    background: linear-gradient(180deg, var(--panel) 0%, var(--bg-deeper) 100%);
    border: 1px solid var(--violet);
    border-radius: var(--radius);
    box-shadow:
      0 0 40px rgba(168, 85, 247, 0.5),
      0 12px 50px rgba(0,0,0,0.7),
      inset 0 1px 0 rgba(255,255,255,0.1);
    padding: 22px 24px;
    min-width: 300px;
    transform: translateY(8px) scale(0.96);
    transition: transform 220ms cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
  }
  .edit-modal::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--violet-hot), var(--magenta), transparent);
  }
  .overlay.show .edit-modal { transform: translateY(0) scale(1); }

  .edit-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--cyan);
    margin: 0 0 12px;
  }
  .edit-modal input {
    width: 100%;
    font-size: 22px;
    padding: 12px 14px;
    text-align: center;
  }
  .edit-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 14px;
  }

  /* ========== Mobile ========== */
  @media (max-width: 880px) {
    html, body { overflow: auto; height: auto; }
    .page { height: auto; }

</style>
</head>
<body>
<div class="page">

<!-- Edit logit modal -->
<div class="overlay" id="overlay">

</div>

<script>
/* ---------- i18n ---------- */
const I18N = {
  ru: {
    title: 'Softmax Lab',
    subtitle: 'логиты → температура → top-k / top-p → вероятности',
    logitsCount: 'Логитов',
    temperature: 'Температура',
    tempResetTitle: 'Сбросить температуру в 1.00',
    tempResetAria: 'Сбросить температуру',
    logitsTitle: 'Логиты',
    logitsHint: 'кликни по столбцу — изменить',
    probsTitle: 'Вероятности',
    fillSection: 'Заполнение',
    rangeFrom: 'от',
    rangeTo: 'до',
    btnRandom: 'Случайные',
    btnRandomTitle: 'Случайные значения в указанном диапазоне',
    stepLabel: 'шаг',
    btnSteps: 'Ступеньки',
    btnStepsTitle: 'Логиты 1, 1+шаг, 1+2·шаг, … При шаге ln(2)≈0.693 соседние вероятности отличаются в 2 раза.',
    constLabel: 'знач.',
    btnConst: 'Заполнить',
    btnConstTitle: 'Заполнить все логиты одинаковым значением',
    filtersSection: 'Фильтры',
    editLogit: 'Логит',
    cancel: 'Отмена',
    lockScaleTitle: 'Зафиксировать масштаб 0–100%',
    // Tooltips & dynamic strings
    chartLogit: 'Логит', // tooltip title prefix on both charts
  },
  en: {
    title: 'Softmax Lab',
    subtitle: 'logits → temperature → top-k / top-p → probabilities',
    logitsCount: 'Logits',
    temperature: 'Temperature',
    tempResetTitle: 'Reset temperature to 1.00',
    tempResetAria: 'Reset temperature',
    logitsTitle: 'Logits',
    logitsHint: 'click a bar to edit',
    probsTitle: 'Probabilities',
    fillSection: 'Fill',
    rangeFrom: 'from',
    rangeTo: 'to',
    btnRandom: 'Random',
    btnRandomTitle: 'Random values within the given range',
    stepLabel: 'step',
    btnSteps: 'Steps',
    btnStepsTitle: 'Logits 1, 1+step, 1+2·step, … With step ln(2)≈0.693 adjacent probabilities differ by a factor of 2.',
    constLabel: 'value',
    btnConst: 'Fill',
    btnConstTitle: 'Fill all logits with the same value',
    filtersSection: 'Filters',
    editLogit: 'Logit',
    cancel: 'Cancel',
    lockScaleTitle: 'Lock scale to 0–100%',
    chartLogit: 'Logit',
  },
};

let lang = 'en';
const t = key => (I18N[lang] && I18N[lang][key]) || key;

function applyI18n() {
  document.documentElement.lang = lang;

  // Text content
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  // title attribute
  document.querySelectorAll('[data-i18n-title]').forEach(el => {
    el.setAttribute('title', t(el.dataset.i18nTitle));
  });
  // aria-label attribute
  document.querySelectorAll('[data-i18n-aria]').forEach(el => {
    el.setAttribute('aria-label', t(el.dataset.i18nAria));
  });

  // Active state on lang buttons
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });

  // Update <title>
  document.title = t('title');

  // Re-render charts so tooltip labels and probsHint pick up the new language
  if (typeof render === 'function') render();
}

// Wire up lang switcher (idempotent, runs immediately because buttons exist by now)
document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    lang = btn.dataset.lang;
    applyI18n();
  });
});

/* ---------- State ---------- */
const state = {
  logits: [],
  temperature: 1.0,
  topkEnabled: false,
  topk: 10,
  toppEnabled: false,
  topp: 0.9,
  randMin: 0,
  randMax: 1.5,
  stepValue: 0.693,
  constValue: 1,
  lockScale: false,
};

/* ---------- Helpers ---------- */
function randomLogits(n, lo, hi) {
  if (lo > hi) [lo, hi] = [hi, lo];
  const out = [];
  for (let i = 0; i < n; i++) {
    out.push(Number((lo + Math.random() * (hi - lo)).toFixed(3)));
  }
  return out;
}
state.logits = randomLogits(10, 0, 1.5);

/* ---------- Math ---------- */
function computeProbs() {
  const L = state.logits;
  const T = Math.max(state.temperature, 1e-9);
  const n = L.length;
  if (n === 0) return [];

  const scaled = L.map(v => v / T);
  const max = Math.max(...scaled);
  const exps = scaled.map(v => Math.exp(v - max));
  const sum = exps.reduce((a, b) => a + b, 0) || 1;
  let probs = exps.map(e => e / sum);

  if (state.topkEnabled) {
    const k = Math.min(Math.max(1, state.topk | 0), n);
    const indexed = probs.map((p, i) => ({ p, i }));
    indexed.sort((a, b) => b.p - a.p);
    const keep = new Set(indexed.slice(0, k).map(x => x.i));
    probs = probs.map((p, i) => keep.has(i) ? p : 0);
  }

  if (state.toppEnabled) {
    const p_thresh = Math.min(Math.max(0.0001, state.topp), 1);
    const indexed = probs.map((p, i) => ({ p, i }));
    indexed.sort((a, b) => b.p - a.p);
    let cum = 0;
    const keep = new Set();
    for (const item of indexed) {
      keep.add(item.i);
      cum += item.p;
      if (cum >= p_thresh) break;
    }
    probs = probs.map((p, i) => keep.has(i) ? p : 0);
  }

  const total = probs.reduce((a, b) => a + b, 0);
  if (total > 0) probs = probs.map(p => p / total);
  return probs;
}

/* ---------- Charts ---------- */
const ACCENT = '#ff2e92';
const ACCENT_PROBS = '#22d3ee';
const ACCENT_PROBS_HOVER = '#67e8f9';
const ACCENT_HOVER = '#ff5cab';
const MUTED = 'rgba(106, 95, 163, 0.35)';
const MUTED_HOVER = 'rgba(106, 95, 163, 0.6)';
const GRID = 'rgba(168, 85, 247, 0.10)';
const TICK = '#9d8fd9';

// At ~10 bars across the full chart width, bars look "full".
// Cap thickness so 2 logits don't become ridiculously fat blocks.
const MAX_BAR_THICKNESS = 28; // px

const baseScales = {
  x: {
    grid: { display: false },
    border: { display: false },
    ticks: {
      color: TICK,
      font: { size: 10, family: '-apple-system, BlinkMacSystemFont, "Inter", sans-serif' },
      maxRotation: 0,
      autoSkip: true,
      autoSkipPadding: 12,
    },
  },
  y: {
    beginAtZero: true,
    grid: { color: GRID, drawTicks: false },
    border: { display: false },
    ticks: {
      color: TICK,
      font: { size: 10, family: '-apple-system, BlinkMacSystemFont, "Inter", sans-serif' },
      padding: 8,
      maxTicksLimit: 5,
    },
  },
};

const baseTooltip = {
  backgroundColor: 'rgba(2, 1, 8, 0.96)',
  titleColor: '#fff',
  bodyColor: '#fff',
  titleFont: { size: 11, weight: '600', family: '-apple-system, BlinkMacSystemFont, "Inter", sans-serif' },
  bodyFont: { size: 12, family: '-apple-system, BlinkMacSystemFont, "Inter", sans-serif' },
  padding: 10,
  cornerRadius: 8,
  displayColors: false,
  caretSize: 4,
  borderWidth: 0,
};

const labelsFor = n => Array.from({ length: n }, (_, i) => String(i + 1));

// Minimum number of slots in the chart; if there are fewer real logits,
// the rest are rendered as empty (zero, no label) phantom slots so that
// real bars stay grouped on the left at consistent thickness.
const MIN_SLOTS = 15;

function paddedLabels(n) {
  const slots = Math.max(n, MIN_SLOTS);
  return Array.from({ length: slots }, (_, i) => i < n ? String(i + 1) : '');
}
function realCount() { return state.logits.length; }
function isPhantomIndex(i) { return i >= state.logits.length; }

const logitsCtx = document.getElementById('logitsChart').getContext('2d');
const logitsChart = new Chart(logitsCtx, {
  type: 'bar',
  data: {
    labels: paddedLabels(state.logits.length),
    datasets: [{
      label: 'Логит',
      data: state.logits,
      backgroundColor: ACCENT,
      hoverBackgroundColor: ACCENT_HOVER,
      borderRadius: 3,
      borderSkipped: false,
      categoryPercentage: 0.92,
      barPercentage: 0.88,
      maxBarThickness: MAX_BAR_THICKNESS,
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 300, easing: 'easeOutQuart' },
    animations: { y: { duration: 300, easing: 'easeOutQuart' } },
    layout: { padding: { top: 4, right: 4, bottom: 0, left: 0 } },
    onHover: (e, els) => {
      const real = els.find(el => el.index < state.logits.length);
      e.native.target.style.cursor = real ? 'pointer' : 'default';
    },
    onClick: (e, els) => {
      const real = els.find(el => el.index < state.logits.length);
      if (real) openEdit(real.index);
    },
    scales: {
      ...baseScales,
      y: { ...baseScales.y, suggestedMax: 1 },
    },
    plugins: {
      legend: { display: false },
      tooltip: {
        ...baseTooltip,
        filter: item => item.dataIndex < state.logits.length,
        callbacks: {
          title: items => t('chartLogit') + ' ' + items[0].label,
          label: ctx => ctx.parsed.y.toFixed(3),
        },
      },
    },
  },
});

const probsCtx = document.getElementById('probsChart').getContext('2d');
const probsChart = new Chart(probsCtx, {
  type: 'bar',
  data: {
    labels: paddedLabels(state.logits.length),
    datasets: [{
      label: 'Вероятность',
      data: [],
      backgroundColor: [],
      hoverBackgroundColor: [],
      borderRadius: 3,
      borderSkipped: false,
      categoryPercentage: 0.92,
      barPercentage: 0.88,
      maxBarThickness: MAX_BAR_THICKNESS,
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 300, easing: 'easeOutQuart' },
    animations: { y: { duration: 300, easing: 'easeOutQuart' } },
    layout: { padding: { top: 4, right: 4, bottom: 0, left: 0 } },
    scales: {
      ...baseScales,
      y: {
        ...baseScales.y,
        ticks: {
          ...baseScales.y.ticks,
          callback: v => (v * 100).toFixed(0) + '%',
        },
      },
    },
    plugins: {
      legend: { display: false },
      tooltip: {
        ...baseTooltip,
        filter: item => item.dataIndex < state.logits.length,
        callbacks: {
          title: items => t('chartLogit') + ' ' + items[0].label,
          label: ctx => (ctx.parsed.y * 100).toFixed(2) + '%',
        },
      },
    },
  },
});

/* ---------- Render ---------- */
function render() {
  const n = state.logits.length;
  const labels = paddedLabels(n);
  const slots = labels.length;

  // Pad logits with zeros for phantom slots
  const paddedLogits = state.logits.slice();
  while (paddedLogits.length < slots) paddedLogits.push(0);
  const logitColors = paddedLogits.map((_, i) => i >= n ? 'rgba(0,0,0,0)' : ACCENT);
  const logitHoverColors = paddedLogits.map((_, i) => i >= n ? 'rgba(0,0,0,0)' : ACCENT_HOVER);

  logitsChart.data.labels = labels;
  logitsChart.data.datasets[0].data = paddedLogits;
  logitsChart.data.datasets[0].backgroundColor = logitColors;
  logitsChart.data.datasets[0].hoverBackgroundColor = logitHoverColors;
  const maxL = Math.max(...state.logits, 0);
  logitsChart.options.scales.y.suggestedMax = maxL > 0 ? maxL : 1;
  logitsChart.update();

  const probs = computeProbs();
  const paddedProbs = probs.slice();
  while (paddedProbs.length < slots) paddedProbs.push(0);
  const colors = paddedProbs.map((p, i) => i >= n ? 'rgba(0,0,0,0)' : (p > 0 ? ACCENT_PROBS : MUTED));
  const hoverColors = paddedProbs.map((p, i) => i >= n ? 'rgba(0,0,0,0)' : (p > 0 ? ACCENT_PROBS_HOVER : MUTED_HOVER));
  probsChart.data.labels = labels;
  probsChart.data.datasets[0].data = paddedProbs;
  probsChart.data.datasets[0].backgroundColor = colors;
  probsChart.data.datasets[0].hoverBackgroundColor = hoverColors;
  probsChart.options.scales.y.max = state.lockScale ? 1 : undefined;
  probsChart.update();

  const parts = ['softmax(L / ' + state.temperature.toFixed(2) + ')'];
  if (state.topkEnabled) parts.push('top-k=' + state.topk);
  if (state.toppEnabled) parts.push('top-p=' + state.topp.toFixed(2));
  document.getElementById('probsHint').textContent = parts.join(' • ');
}

/* ---------- Controls ---------- */
const countSlider = document.getElementById('count');
const countVal = document.getElementById('countVal');
const topkValue = document.getElementById('topkValue');

function updateTopkMax() {
  const n = state.logits.length;
  topkValue.max = n;
  if (state.topk > n) {
    state.topk = n;
    topkValue.value = n;
  }
}

countSlider.addEventListener('input', () => {
  const newCount = parseInt(countSlider.value, 10);
  countVal.textContent = newCount;
  const cur = state.logits.length;
  if (newCount > cur) {
    const maxL = Math.max(...state.logits, 0);
    const fill = maxL > 0 ? Number((maxL / 2).toFixed(3)) : 0;
    for (let i = cur; i < newCount; i++) state.logits.push(fill);
  } else if (newCount < cur) {
    state.logits = state.logits.slice(0, newCount);
  }
  updateTopkMax();
  render();
});

// Random range inputs
const randMinInput = document.getElementById('randMin');
const randMaxInput = document.getElementById('randMax');
function clampRand(v, fallback) {
  let n = parseFloat(v);
  if (isNaN(n)) n = fallback;
  return Math.min(1000, Math.max(0, n));
}
randMinInput.addEventListener('change', () => {
  state.randMin = Number(clampRand(randMinInput.value, 0).toFixed(3));
  randMinInput.value = state.randMin;
});
randMaxInput.addEventListener('change', () => {
  state.randMax = Number(clampRand(randMaxInput.value, 1000).toFixed(3));
  randMaxInput.value = state.randMax;
});

document.getElementById('btnRandom').addEventListener('click', () => {
  state.logits = randomLogits(state.logits.length, state.randMin, state.randMax);
  render();
});
document.getElementById('btnSteps').addEventListener('click', () => {
  // Each next logit is +step higher. At step=ln(2) and T=1, adjacent probabilities differ by a factor of 2.
  const STEP = state.stepValue;
  const n = state.logits.length;
  const arr = [];
  for (let i = 0; i < n; i++) {
    arr.push(Number((1 + i * STEP).toFixed(3)));
  }
  state.logits = arr;
  render();
});

const stepValueInput = document.getElementById('stepValue');
stepValueInput.addEventListener('change', () => {
  let v = parseFloat(stepValueInput.value);
  if (isNaN(v)) v = 0.693;
  v = Math.min(1000, Math.max(0, v));
  state.stepValue = Number(v.toFixed(3));
  stepValueInput.value = state.stepValue;
});
document.getElementById('btnConst').addEventListener('click', () => {
  const v = state.constValue;
  state.logits = state.logits.map(() => v);
  render();
});

const constValueInput = document.getElementById('constValue');
constValueInput.addEventListener('change', () => {
  let v = parseFloat(constValueInput.value);
  if (isNaN(v)) v = 1;
  v = Math.min(1000, Math.max(0, v));
  state.constValue = Number(v.toFixed(3));
  constValueInput.value = state.constValue;
});

// Temperature
// Slider is mapped non-linearly: position 0..1000 -> temperature using a
// log mapping so values around 0.5-1.5 get more slider real estate.
const TEMP_MIN = 0.01;
const TEMP_MAX = 50.0;
const tempSlider = document.getElementById('tempSlider');
const tempVal = document.getElementById('tempVal');

// Override slider range to a normalized [0, 1000] index
tempSlider.min = 0;
tempSlider.max = 1000;
tempSlider.step = 1;

function pos2temp(pos) {
  const t = pos / 1000; // 0..1
  const v = TEMP_MIN * Math.pow(TEMP_MAX / TEMP_MIN, t);
  return Math.round(v * 100) / 100;
}
function temp2pos(temp) {
  const t = Math.log(temp / TEMP_MIN) / Math.log(TEMP_MAX / TEMP_MIN);
  return Math.round(Math.min(1, Math.max(0, t)) * 1000);
}

// Initial position
tempSlider.value = temp2pos(state.temperature);
tempVal.textContent = state.temperature.toFixed(2);

tempSlider.addEventListener('input', () => {
  state.temperature = pos2temp(parseInt(tempSlider.value, 10));
  tempVal.textContent = state.temperature.toFixed(2);
  render();
});

// Reset temperature button
document.getElementById('tempReset').addEventListener('click', () => {
  state.temperature = 1.0;
  tempSlider.value = temp2pos(1.0);
  tempVal.textContent = '1.00';
  render();
});

// Top-k
const topkEnable = document.getElementById('topkEnable');
const topkRow = document.getElementById('topkRow');
topkEnable.addEventListener('change', () => {
  state.topkEnabled = topkEnable.checked;
  topkRow.classList.toggle('disabled', !state.topkEnabled);
  topkValue.disabled = !state.topkEnabled;
  render();
});
topkValue.addEventListener('change', () => {
  let v = parseInt(topkValue.value, 10);
  if (isNaN(v)) v = 1;
  v = Math.min(state.logits.length, Math.max(1, v));
  state.topk = v;
  topkValue.value = v;
  render();
});

// Top-p
const toppEnable = document.getElementById('toppEnable');
const toppRow = document.getElementById('toppRow');
const toppValue = document.getElementById('toppValue');
toppEnable.addEventListener('change', () => {
  state.toppEnabled = toppEnable.checked;
  toppRow.classList.toggle('disabled', !state.toppEnabled);
  toppValue.disabled = !state.toppEnabled;
  render();
});
toppValue.addEventListener('change', () => {
  let v = parseFloat(toppValue.value);
  if (isNaN(v)) v = 0.9;
  v = Math.min(1, Math.max(0.01, v));
  state.topp = Number(v.toFixed(2));
  toppValue.value = state.topp.toFixed(2);
  render();
});

// Lock scale toggle
document.getElementById('lockScale').addEventListener('change', (e) => {
  state.lockScale = e.target.checked;
  render();
});

/* ---------- Edit modal ---------- */
const overlay = document.getElementById('overlay');
const editInput = document.getElementById('editInput');
const editIdxLabel = document.getElementById('editIdx');
let editingIdx = -1;

function openEdit(idx) {
  editingIdx = idx;
  editIdxLabel.textContent = '#' + (idx + 1);
  editInput.value = state.logits[idx].toFixed(3);
  overlay.classList.add('show');
  setTimeout(() => { editInput.focus(); editInput.select(); }, 60);
}
function closeEdit() {
  overlay.classList.remove('show');
  editingIdx = -1;
}
function commitEdit() {
  if (editingIdx < 0) return;
  let v = parseFloat(editInput.value);
  if (isNaN(v)) v = 0;
  v = Math.min(1000, Math.max(0, v));
  state.logits[editingIdx] = Number(v.toFixed(3));
  closeEdit();
  render();
}
document.getElementById('editOk').addEventListener('click', commitEdit);
document.getElementById('editCancel').addEventListener('click', closeEdit);
overlay.addEventListener('click', (e) => { if (e.target === overlay) closeEdit(); });
editInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') commitEdit();
  if (e.key === 'Escape') closeEdit();
});

/* ---------- First render ---------- */
updateTopkMax();
applyI18n(); // also runs render()
</script>
</body>
</html>
