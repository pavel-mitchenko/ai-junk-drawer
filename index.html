<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Junk Drawer</title>
<style>
  :root {
    --bg: #0e0e10;
    --bg-soft: #16161a;
    --line: #2a2a30;
    --text: #f4f4f5;
    --text-muted: #8a8a93;
    --text-soft: #5a5a63;
    --accent: #ff7849;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: ui-serif, "Iowan Old Style", "Apple Garamond", Baskerville, "Times New Roman", serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
  }

  .mono {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
  }

  .page {
    max-width: 880px;
    margin: 0 auto;
    padding: 96px 32px 80px;
  }

  /* ---- Header ---- */
  header {
    border-bottom: 1px solid var(--line);
    padding-bottom: 28px;
    margin-bottom: 40px;
  }
  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-soft);
    margin-bottom: 18px;
  }
  .eyebrow .dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 8px;
    transform: translateY(-1px);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }
  h1 {
    font-size: clamp(40px, 7vw, 64px);
    font-weight: 400;
    line-height: 1;
    letter-spacing: -0.03em;
  }
  h1 em {
    font-style: italic;
    color: var(--accent);
  }
  .lede {
    margin-top: 22px;
    max-width: 540px;
    font-size: 16px;
    line-height: 1.5;
    color: var(--text-muted);
  }
  .lede a {
    color: var(--text);
    border-bottom: 1px solid var(--line);
    text-decoration: none;
    transition: border-color 200ms ease;
  }
  .lede a:hover { border-color: var(--accent); }

  /* ---- Section heading ---- */
  .section-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 4px;
    padding: 12px 0;
    border-bottom: 1px solid var(--line);
  }
  .section-head h2 {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .section-head .count {
    font-size: 12px;
    color: var(--text-soft);
    letter-spacing: 0.04em;
  }

  /* ---- Project list ---- */
  .projects {
    list-style: none;
  }
  .project {
    display: grid;
    grid-template-columns: 56px 1fr auto;
    gap: 24px;
    align-items: baseline;
    padding: 24px 0;
    border-bottom: 1px solid var(--line);
    text-decoration: none;
    color: inherit;
    transition: padding 280ms cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }
  .project::before {
    content: "";
    position: absolute;
    left: -16px;
    top: 50%;
    width: 0;
    height: 1px;
    background: var(--accent);
    transform: translateY(-50%);
    transition: width 280ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .project:hover {
    padding-left: 16px;
  }
  .project:hover::before {
    width: 12px;
  }
  .project:hover .project-title {
    color: var(--accent);
  }
  .project:hover .arrow {
    transform: translate(4px, -4px);
    color: var(--accent);
  }

  .num {
    font-size: 13px;
    color: var(--text-soft);
    letter-spacing: 0.04em;
    align-self: baseline;
    padding-top: 6px;
  }
  .project-body { min-width: 0; }
  .project-title {
    font-size: 28px;
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1.1;
    transition: color 200ms ease;
  }
  .project-meta {
    margin-top: 8px;
    font-size: 12px;
    color: var(--text-soft);
    letter-spacing: 0.04em;
  }
  .project-meta .sep {
    margin: 0 8px;
    color: var(--text-soft);
    opacity: 0.5;
  }
  .project-blurb {
    margin-top: 10px;
    color: var(--text-muted);
    font-size: 15px;
    line-height: 1.5;
    max-width: 56ch;
  }

  .arrow {
    align-self: baseline;
    padding-top: 12px;
    color: var(--text-soft);
    transition: transform 220ms ease, color 200ms ease;
  }

  .tag {
    display: inline-block;
    padding: 1px 7px;
    border: 1px solid var(--line);
    border-radius: 999px;
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-right: 4px;
  }

  /* ---- Footer ---- */
  footer {
    margin-top: 80px;
    padding-top: 24px;
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    color: var(--text-soft);
    font-size: 12px;
    letter-spacing: 0.04em;
  }
  footer a {
    color: var(--text-muted);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 200ms ease, color 200ms ease;
  }
  footer a:hover { color: var(--text); border-bottom-color: var(--line); }

  @media (max-width: 560px) {
    .page { padding: 56px 22px 56px; }
    .project {
      grid-template-columns: 36px 1fr;
      gap: 16px;
    }
    .arrow { display: none; }
    .project-title { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="page">

  <header>
    <p class="eyebrow mono"><span class="dot"></span>AI-assisted experiments</p>
    <h1>The AI Junk <em>Drawer</em>.</h1>
    <p class="lede">
        A loose collection of small web tools and toys built with help from large language models. Source on <a href="https://github.com/pavel-mitchenko/ai-junk-drawer" target="_blank" rel="noopener">GitHub</a>.
    </p>
  </header>

  <section>
    <div class="section-head">
      <h2 class="mono">Projects</h2>
      <span class="count mono" id="count"></span>
    </div>
    <ul class="projects" id="projectList"></ul>
  </section>

  <footer>
    <span class="mono">© <span id="year"></span></span>
    <a href="https://github.com/pavel-mitchenko/ai-junk-drawer" target="_blank" rel="noopener" class="mono">view on github →</a>
  </footer>

</div>

<script>
/* ---------- Add new projects here ---------- */
/* Order: newest at the top. */
const projects = [
  {
    title: "Softmax Lab",
    href: "/ai-junk-drawer/SoftmaxLab/",
    blurb: "Interactive playground for building intuition about how softmax, temperature, top-k and top-p shape token probabilities in language models.",
    date: "2026",
    tags: ["visualization", "llm"],
  },
  // {
  //   title: "Next thing",
  //   href: "/ai-junk-drawer/NextThing/",
  //   blurb: "One-line description of the next thing.",
  //   date: "2026",
  //   tags: ["tag1", "tag2"],
  // },
];
/* ------------------------------------------- */

const list = document.getElementById('projectList');
const pad = n => String(n).padStart(2, '0');

projects.forEach((p, i) => {
  const a = document.createElement('a');
  a.className = 'project';
  a.href = p.href;

  const num = document.createElement('span');
  num.className = 'num mono';
  num.textContent = pad(projects.length - i);

  const body = document.createElement('div');
  body.className = 'project-body';

  const title = document.createElement('div');
  title.className = 'project-title';
  title.textContent = p.title;

  const meta = document.createElement('div');
  meta.className = 'project-meta mono';
  const tagsHtml = (p.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
  meta.innerHTML = `${tagsHtml}<span class="sep">·</span>${p.date || ''}`;

  const blurb = document.createElement('div');
  blurb.className = 'project-blurb';
  blurb.textContent = p.blurb || '';

  body.appendChild(title);
  body.appendChild(meta);
  if (p.blurb) body.appendChild(blurb);

  const arrow = document.createElement('span');
  arrow.className = 'arrow';
  arrow.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>`;

  a.appendChild(num);
  a.appendChild(body);
  a.appendChild(arrow);

  list.appendChild(a);
});

document.getElementById('count').textContent = pad(projects.length) + ' total';
document.getElementById('year').textContent = new Date().getFullYear();
</script>
</body>
</html>
